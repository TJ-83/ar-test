<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Somnus — 产品预览</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --walnut: #4a3728;
      --walnut-light: #6b4f3a;
      --cream: #f5f0e8;
      --stone: #c8bfb0;
      --dark: #1a1612;
      --accent: #b8956a;
    }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 40px;
      border-bottom: 1px solid rgba(200,191,176,0.12);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.6rem;
      letter-spacing: 0.25em;
      color: var(--cream);
      text-transform: uppercase;
    }

    .logo span { color: var(--accent); }

    .header-tag {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--stone);
      opacity: 0.7;
    }

    /* ── Layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      min-height: calc(100vh - 81px);
    }

    /* ── Viewer ── */
    .viewer-wrap {
      position: relative;
      background: linear-gradient(145deg, #1e1916 0%, #0f0d0b 100%);
    }

    model-viewer {
      width: 100%;
      height: 100%;
      min-height: 600px;
      --poster-color: transparent;
      background-color: transparent;
    }

    /* Hide default AR button — we use our own */
    model-viewer::part(default-ar-button) { display: none; }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0f0d0b;
      transition: opacity 0.6s ease;
      pointer-events: none;
      z-index: 5;
    }
    .loading-overlay.hidden { opacity: 0; }

    .loader-ring {
      width: 48px; height: 48px;
      border: 1px solid rgba(184,149,106,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--stone);
    }

    /* Viewer label */
    .viewer-label {
      position: absolute;
      bottom: 24px;
      left: 28px;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(200,191,176,0.35);
      pointer-events: none;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-left: 1px solid rgba(200,191,176,0.1);
      display: flex;
      flex-direction: column;
      padding: 40px 32px;
      gap: 40px;
      background: rgba(26,22,18,0.95);
    }

    .product-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      line-height: 1.2;
      color: var(--cream);
    }

    .product-sku {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 6px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(200,191,176,0.15) 0%, transparent 100%);
    }

    /* ── Controls ── */
    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--stone);
      opacity: 0.6;
      margin-bottom: 16px;
    }

    .drawer-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .drawer-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: transparent;
      border: 1px solid rgba(200,191,176,0.15);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      text-align: left;
    }

    .drawer-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(184,149,106,0.08) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .drawer-btn:hover::before { opacity: 1; }
    .drawer-btn:hover { border-color: rgba(184,149,106,0.4); }

    .drawer-btn.active {
      border-color: var(--accent);
      background: rgba(184,149,106,0.06);
    }

    .btn-icon {
      width: 32px; height: 32px;
      border: 1px solid rgba(200,191,176,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.3s;
    }
    .drawer-btn.active .btn-icon { border-color: var(--accent); }

    .btn-icon svg {
      width: 14px; height: 14px;
      stroke: var(--stone);
      fill: none;
      stroke-width: 1.5;
      transition: stroke 0.3s, transform 0.4s ease;
    }
    .drawer-btn.active .btn-icon svg { stroke: var(--accent); }

    /* Arrow icon rotates when open */
    .drawer-btn.active .btn-icon svg.arrow { transform: translateX(4px); }

    .btn-text { flex: 1; }
    .btn-name {
      display: block;
      color: var(--cream);
      margin-bottom: 2px;
    }
    .btn-state {
      display: block;
      font-size: 0.65rem;
      color: var(--stone);
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    /* All drawers toggle */
    .all-btn {
      margin-top: 4px;
      padding: 14px 20px;
      background: rgba(184,149,106,0.08);
      border: 1px solid rgba(184,149,106,0.25);
      color: var(--accent);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .all-btn:hover {
      background: rgba(184,149,106,0.15);
      border-color: var(--accent);
    }

    /* ── AR Button ── */
    .ar-section { margin-top: auto; }

    .ar-btn {
      width: 100%;
      padding: 18px 24px;
      background: var(--walnut);
      border: none;
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .ar-btn:hover { background: var(--walnut-light); }

    .ar-btn svg {
      width: 18px; height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
    }

    .ar-note {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--stone);
      opacity: 0.4;
      text-align: center;
      margin-top: 10px;
      text-transform: uppercase;
    }

    /* ── Specs ── */
    .specs { display: flex; flex-direction: column; gap: 10px; }

    .spec-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(200,191,176,0.06);
    }
    .spec-row:last-child { border-bottom: none; }

    .spec-key {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--stone);
      opacity: 0.5;
    }
    .spec-val {
      font-size: 0.75rem;
      color: var(--cream);
      letter-spacing: 0.05em;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; grid-template-rows: 60vh auto; }
      .sidebar { border-left: none; border-top: 1px solid rgba(200,191,176,0.1); padding: 28px 20px; }
      header { padding: 20px; }
      model-viewer { min-height: unset; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Som<span>nus</span></div>
  <div class="header-tag">3D Product Preview — WebAR Ready</div>
</header>

<div class="main">

  <!-- ── 3D Viewer ── -->
  <div class="viewer-wrap">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loader-ring"></div>
      <div class="loading-text">Loading Model</div>
    </div>

    <model-viewer
      id="cabinetViewer"
      src="testmotion9.glb"
      ios-src="testmotion9.usdz"
      alt="Somnus bathroom vanity cabinet"
      camera-controls
      auto-rotate
      auto-rotate-delay="3000"
      rotation-per-second="12deg"
      ar
      ar-modes="webxr scene-viewer quick-look"
      shadow-intensity="1.2"
      shadow-softness="0.8"
      environment-image="neutral"
      exposure="0.9"
    ></model-viewer>

    <div class="viewer-label">拖动旋转 · 双指缩放</div>
  </div>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div>
      <h1 class="product-title">浴室<br>储物柜</h1>
      <p class="product-sku">SOB-B-500-602 · Florentine Walnut</p>
    </div>

    <div class="divider"></div>

    <!-- Drawer Controls -->
    <div>
      <p class="section-label">抽屉控制</p>
      <div class="drawer-controls">

        <button class="drawer-btn" id="btn0" onclick="toggleDrawer(0)">
          <div class="btn-icon">
            <svg class="arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="btn-text">
            <span class="btn-name">上层抽屉</span>
            <span class="btn-state" id="state0">已关闭</span>
          </div>
        </button>

        <button class="drawer-btn" id="btn1" onclick="toggleDrawer(1)">
          <div class="btn-icon">
            <svg class="arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="btn-text">
            <span class="btn-name">下层抽屉</span>
            <span class="btn-state" id="state1">已关闭</span>
          </div>
        </button>

        <button class="all-btn" id="allBtn" onclick="toggleAll()">
          全部展开
        </button>

      </div>
    </div>

    <div class="divider"></div>

    <!-- Specs -->
    <div>
      <p class="section-label">产品规格</p>
      <div class="specs">
        <div class="spec-row">
          <span class="spec-key">宽度</span>
          <span class="spec-val">500 mm</span>
        </div>
        <div class="spec-row">
          <span class="spec-key">高度</span>
          <span class="spec-val">602 mm</span>
        </div>
        <div class="spec-row">
          <span class="spec-key">饰面</span>
          <span class="spec-val">Florentine Walnut</span>
        </div>
        <div class="spec-row">
          <span class="spec-key">五金</span>
          <span class="spec-val">Brushed Stainless</span>
        </div>
      </div>
    </div>

    <!-- AR Button -->
    <div class="ar-section">
      <button class="ar-btn" onclick="launchAR()">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        在你的空间中查看
      </button>
      <p class="ar-note">需要 iOS Safari 或 Android Chrome</p>
    </div>

  </aside>
</div>

<script>
  const viewer = document.getElementById('cabinetViewer');

  // ── 动画名称 ── 改成你 GLB 里实际的动画名
  // 如果两个抽屉是同一个动画：
  const ANIMATION_NAME = 'Drawer_Open_Close';

  // 如果两个抽屉是不同动画，在这里分别定义：
  // const ANIMATIONS = ['Drawer_Top_Open', 'Drawer_Bottom_Open'];

  const drawerStates = [false, false]; // false = 关闭
  let allOpen = false;

  // 隐藏加载覆盖层
  viewer.addEventListener('load', () => {
    document.getElementById('loadingOverlay').classList.add('hidden');
    console.log('可用动画：', viewer.availableAnimations);
  });

  function toggleDrawer(index) {
    drawerStates[index] = !drawerStates[index];
    const isOpen = drawerStates[index];

    const btn = document.getElementById(`btn${index}`);
    const stateEl = document.getElementById(`state${index}`);

    btn.classList.toggle('active', isOpen);
    stateEl.textContent = isOpen ? '已打开' : '已关闭';

    // 播放动画
    viewer.animationName = ANIMATION_NAME;
    viewer.play({ repetitions: 1 });

    // 更新全部按钮文字
    updateAllBtn();
  }

  function toggleAll() {
    allOpen = !allOpen;
    drawerStates[0] = allOpen;
    drawerStates[1] = allOpen;

    [0, 1].forEach(i => {
      document.getElementById(`btn${i}`).classList.toggle('active', allOpen);
      document.getElementById(`state${i}`).textContent = allOpen ? '已打开' : '已关闭';
    });

    viewer.animationName = ANIMATION_NAME;
    viewer.play({ repetitions: 1 });

    updateAllBtn();
  }

  function updateAllBtn() {
    const anyOpen = drawerStates.some(s => s);
    document.getElementById('allBtn').textContent = anyOpen ? '全部关闭' : '全部展开';
  }

  function launchAR() {
    // 触发 model-viewer 内置 AR
    viewer.activateAR();
  }
</script>

</body>
</html>
