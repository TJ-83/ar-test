<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabinet AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #lock-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        border: 2px solid white;
        border-radius: 30px;
        padding: 14px 32px;
        font-size: 16px;
        font-family: Arial, sans-serif;
        z-index: 999;
        display: none;
        cursor: pointer;
        white-space: nowrap;
      }
    </style>
    <script>
      AFRAME.registerComponent('cabinet-animation', {
        init: function () {
          var el = this.el;
          el.addEventListener('model-loaded', function () {
            el.setAttribute('animation-mixer',
              'clip: Drawer_Open_Close; loop: repeat; timeScale: 1');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;
                    autoStart: true;
                    filterMinCF: 0.001;
                    filterBeta: 0.01;
                    missTolerance: 5;
                    warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="10000">
        <a-asset-item id="cabinet" src="./testmotion9.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="tracked-target" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="cabinet-model"
          src="#cabinet"
          position="0 0.3 0"
          scale="2.36 2.36 2.36"
          rotation="90 180 0"
          cabinet-animation
        ></a-gltf-model>
      </a-entity>

    </a-scene>

    <button id="lock-btn">🔒 Lock Model - Free Look</button>

    <script>
      var locked = false;
      var lockBtn = document.getElementById('lock-btn');
      var trackedTarget = document.getElementById('tracked-target');
      var cabinetModel = document.getElementById('cabinet-model');
      var scene = document.querySelector('a-scene');

      trackedTarget.addEventListener('targetFound', function () {
        if (!locked) lockBtn.style.display = 'block';
      });

      trackedTarget.addEventListener('targetLost', function () {
        if (!locked) lockBtn.style.display = 'none';
      });

      lockBtn.addEventListener('click', function () {
        if (locked) return;
        locked = true;
        lockBtn.style.display = 'none';

        // 记录世界坐标
        var worldPos = new THREE.Vector3();
        var worldQuat = new THREE.Quaternion();
        var worldScale = new THREE.Vector3();
        cabinetModel.object3D.getWorldPosition(worldPos);
        cabinetModel.object3D.getWorldQuaternion(worldQuat);
        cabinetModel.object3D.getWorldScale(worldScale);

        // 移到场景根节点
        trackedTarget.removeChild(cabinetModel);
        scene.appendChild(cabinetModel);

        // 应用世界坐标
        cabinetModel.object3D.position.copy(worldPos);
        cabinetModel.object3D.quaternion.copy(worldQuat);
        cabinetModel.object3D.scale.copy(worldScale);
        cabinetModel.object3D.visible = true;

        // 停止MindAR追踪
        var mindARSystem = scene.systems['mindar-image-system'];
        if (mindARSystem) mindARSystem.pause();

        // iOS需要用户手势触发陀螺仪权限
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().then(function(state) {
            if (state === 'granted') {
              enableLookControls();
            }
          }).catch(console.error);
        } else {
          // Android直接启用
          enableLookControls();
        }
      });

      function enableLookControls() {
        var camera = document.querySelector('a-camera');
        camera.setAttribute('look-controls', {
          enabled: true,
          magicWindowTrackingEnabled: true,
          pointerLockEnabled: false
        });
      }
    </script>
  </body>
</html>
