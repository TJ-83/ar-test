<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabinet AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
    <script>
      AFRAME.registerComponent('play-animation-on-load', {
        init: function () {
          var model = this.el;
          model.addEventListener('model-loaded', function () {
            var mixer = model.components['animation-mixer'];
            if (mixer) {
              mixer.play();
            } else {
              model.setAttribute('animation-mixer', {
                clip: 'Drawer_Open_Close',
                loop: 'repeat',
                timeScale: 1
              });
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="cabinet" src="./testmotion9.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          src="#cabinet"
          position="0 0 0"
          scale="0.5 0.5 0.5"
          rotation="0 0 0"
          animation-mixer="clip: Drawer_Open_Close; loop: repeat; timeScale: 1"
          play-animation-on-load
        ></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
