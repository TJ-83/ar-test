<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabinet AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #lock-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        border: 2px solid white;
        border-radius: 30px;
        padding: 14px 32px;
        font-size: 16px;
        font-family: Arial, sans-serif;
        z-index: 999;
        display: none;
        cursor: pointer;
        white-space: nowrap;
      }
      #hint {
        position: fixed;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.5);
        color: white;
        border-radius: 20px;
        padding: 8px 20px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        z-index: 999;
        display: none;
        white-space: nowrap;
      }
      #back-btn {
        position: fixed;
        bottom: 40px;
        left: 20px;
        background: rgba(0,0,0,0.6);
        color: white;
        border: 2px solid white;
        border-radius: 20px;
        padding: 12px 20px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        z-index: 999;
        display: none;
        cursor: pointer;
      }
    </style>
    <script>
      AFRAME.registerComponent('cabinet-animation', {
        init: function () {
          var el = this.el;
          el.addEventListener('model-loaded', function () {
            el.setAttribute('animation-mixer',
              'clip: Drawer_Open_Close; loop: repeat; timeScale: 1');
          });
        }
      });

      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.isDragging = false;
          this.lastX = 0;
          this.lastY = 0;
          this.rotY = 0;
          this.rotX = 0;
          this.active = false;
        },
        activate: function () {
          this.active = true;
          // 从当前rotation初始化
          var rot = this.el.getAttribute('rotation');
          this.rotX = rot.x;
          this.rotY = rot.y;
        },
        tick: function () {
          if (!this.active) return;
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind;
                    autoStart: true;
                    filterMinCF: 0.001;
                    filterBeta: 0.01;
                    missTolerance: 5;
                    warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="10000">
        <a-asset-item id="cabinet" src="./testmotion9.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="tracked-target" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="cabinet-model"
          src="#cabinet"
          position="0 0.3 0"
          scale="2.36 2.36 2.36"
          rotation="0 0 0"
          cabinet-animation
        ></a-gltf-model>
      </a-entity>

    </a-scene>

    <button id="lock-btn">🔒 Lock Model — Free Look</button>
    <div id="hint">✋ Drag to rotate</div>
    <button id="back-btn">↺ Scan Again</button>

    <script>
      var locked = false;
      var lockBtn = document.getElementById('lock-btn');
      var backBtn = document.getElementById('back-btn');
      var hint = document.getElementById('hint');
      var trackedTarget = document.getElementById('tracked-target');
      var cabinetModel = document.getElementById('cabinet-model');
      var scene = document.getElementById('ar-scene');

      trackedTarget.addEventListener('targetFound', function () {
        if (!locked) lockBtn.style.display = 'block';
      });
      trackedTarget.addEventListener('targetLost', function () {
        if (!locked) lockBtn.style.display = 'none';
      });

      lockBtn.addEventListener('click', function () {
        locked = true;
        lockBtn.style.display = 'none';

        // 停止MindAR追踪
        var mindARSystem = scene.systems['mindar-image-system'];
        if (mindARSystem) mindARSystem.pause();

        // 隐藏追踪容器但保留模型可见
        // 把模型position固定在摄像头前方
        cabinetModel.setAttribute('position', '0 0 -2');
        cabinetModel.setAttribute('scale', '2 2 2');

        hint.style.display = 'block';
        backBtn.style.display = 'block';

        initDrag();
      });

      backBtn.addEventListener('click', function () {
        window.location.reload();
      });

      function initDrag() {
        var isDragging = false;
        var lastX = 0;
        var lastY = 0;
        var rotX = 0;
        var rotY = 0;

        // 从当前rotation读取初始值
        var currentRot = cabinetModel.getAttribute('rotation');
        rotX = currentRot.x;
        rotY = currentRot.y;

        var canvas = scene.canvas;

        canvas.addEventListener('touchstart', function(e) {
          isDragging = true;
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
          e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) {
          if (!isDragging) return;
          e.preventDefault();
          var dx = e.touches[0].clientX - lastX;
          var dy = e.touches[0].clientY - lastY;
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
          rotY += dx * 0.5;
          rotX += dy * 0.3;
          cabinetModel.setAttribute('rotation', {x: rotX, y: rotY, z: 0});
        }, { passive: false });

        canvas.addEventListener('touchend', function() {
          isDragging = false;
        });
      }
    </script>
  </body>
</html>
