<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabinet Animation Test</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <a-scene>
      <a-assets timeout="10000">
        <a-asset-item id="cabinet" src="./testmotion9.glb"></a-asset-item>
      </a-assets>

      <a-gltf-model
        src="#cabinet"
        position="0 0 -2"
        scale="0.5 0.5 0.5"
        animation-mixer="clip: Drawer_Open_Close; loop: repeat; timeScale: 1"
      ></a-gltf-model>

      <a-camera position="0 0 0"></a-camera>
      <a-sky color="#CCCCCC"></a-sky>
    </a-scene>
  </body>
</html>
