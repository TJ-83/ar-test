<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabinet AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #lock-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        border: 2px solid white;
        border-radius: 30px;
        padding: 14px 32px;
        font-size: 16px;
        font-family: Arial, sans-serif;
        z-index: 999;
        display: none;
        cursor: pointer;
      }
    </style>
    <script>
      AFRAME.registerComponent('cabinet-animation', {
        init: function () {
          var el = this.el;
          el.addEventListener('model-loaded', function () {
            el.setAttribute('animation-mixer',
              'clip: Drawer_Open_Close; loop: repeat; timeScale: 1');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;
                    autoStart: true;
                    filterMinCF: 0.001;
                    filterBeta: 0.01;
                    missTolerance: 5;
                    warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="10000">
        <a-asset-item id="cabinet" src="./testmotion9.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 追踪锚点：跟着触发图移动 -->
      <a-entity id="tracked-target" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="cabinet-model"
          src="#cabinet"
          position="0 0.3 0"
          scale="2.36 2.36 2.36"
          rotation="-90 180 0"
          cabinet-animation
        ></a-gltf-model>
      </a-entity>

    </a-scene>

    <button id="lock-btn">🔒 锁定位置 — 自由查看</button>

    <script>
      var locked = false;
      var lockBtn = document.getElementById('lock-btn');
      var trackedTarget = document.getElementById('tracked-target');
      var cabinetModel = document.getElementById('cabinet-model');
      var scene = document.querySelector('a-scene');

      // 当目标被找到，显示锁定按钮
      trackedTarget.addEventListener('targetFound', function () {
        if (!locked) {
          lockBtn.style.display = 'block';
        }
      });

      trackedTarget.addEventListener('targetLost', function () {
        if (!locked) {
          lockBtn.style.display = 'none';
        }
      });

      // 点击锁定：把模型从追踪锚点移到场景根节点
      lockBtn.addEventListener('click', function () {
        if (locked) return;
        locked = true;
        lockBtn.style.display = 'none';

        // 获取模型当前世界坐标和旋转
        var worldPos = new THREE.Vector3();
        var worldQuat = new THREE.Quaternion();
        var worldScale = new THREE.Vector3();
        cabinetModel.object3D.getWorldPosition(worldPos);
        cabinetModel.object3D.getWorldQuaternion(worldQuat);
        cabinetModel.object3D.getWorldScale(worldScale);

        // 从追踪节点里移除模型
        trackedTarget.removeChild(cabinetModel);

        // 添加到场景根节点
        scene.appendChild(cabinetModel);

        // 应用之前记录的世界坐标
        cabinetModel.object3D.position.copy(worldPos);
        cabinetModel.object3D.quaternion.copy(worldQuat);
        cabinetModel.object3D.scale.copy(worldScale);

        // 停止MindAR追踪（节省性能）
        var mindARSystem = scene.systems['mindar-image-system'];
        if (mindARSystem) mindARSystem.pause();

        // 开启陀螺仪让用户绕模型走动
        var camera = document.querySelector('a-camera');
        camera.setAttribute('look-controls', 'enabled: true');
      });
    </script>
  </body>
</html>
```

---

## 使用流程
```
1. 打开页面，对准触发图
2. 柜子出现，动画播放
3. 屏幕底部出现「🔒 锁定位置」按钮
4. 点击按钮
5. 放下触发图，柜子留在原位
6. 手机绕着柜子走动，从任意角度查看
