<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabinet AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
    <script>
      AFRAME.registerComponent('cabinet-animation', {
        init: function () {
          var el = this.el;
          el.addEventListener('model-loaded', function () {
            el.setAttribute('animation-mixer',
              'clip: Drawer_Open_Close; loop: repeat; timeScale: 1');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; 
                    autoStart: true;
                    filterMinCF: 0.001;
                    filterBeta: 0.01;
                    missTolerance: 5;
                    warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="10000">
        <a-asset-item id="cabinet" src="./testmotion9.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          src="#cabinet"
          position="0 0 0"
          scale="0.5 0.5 0.5"
          rotation="0 0 0"
          cabinet-animation
        ></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
```

---

## 关键参数说明
```
filterMinCF: 0.001   ← 最小截止频率，越小越平滑
filterBeta: 0.01     ← 速度系数，越小抖动越少
missTolerance: 5     ← 丢失目标前等待帧数，防止闪烁
warmupTolerance: 5   ← 检测到目标后稳定帧数再显示
